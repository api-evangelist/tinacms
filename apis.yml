apis:
- aid: tinacms:graphql-content-api
  name: TinaCMS GraphQL Content API
  description: A GraphQL API generated from your TinaCMS schema that serves Markdown
    and JSON content stored in Git repositories. Available locally via the tinacms
    dev CLI (localhost:4001) or hosted via TinaCloud with per-project endpoints. Supports
    queries, mutations, filtering, sorting, and pagination across all defined content
    collections.
