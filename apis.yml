aid: tinacms
name: TinaCMS
description: TinaCMS is an open-source, Git-backed headless CMS that provides a GraphQL
  Content API for managing Markdown, MDX, and JSON content stored in Git repositories.
  It enables real-time visual editing for Next.js, Astro, and other frameworks, with
  TinaCloud offering a hosted Data Layer that indexes and serves content via per-project
  GraphQL endpoints with editorial workflow, media management, and authentication
  support.
